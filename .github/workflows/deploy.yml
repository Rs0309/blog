name: Deploy AWS Blog Automation

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aws-blog-automation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      BEDROCK_REGION: ${{ vars.BEDROCK_REGION || vars.AWS_REGION || 'us-east-1' }}
      STACK_NAME: ${{ vars.STACK_NAME || 'AwsBlogAutomationStack' }}
      SCHEDULE_TIMEZONE: ${{ vars.SCHEDULE_TIMEZONE || 'UTC' }}
      DAILY_SCHEDULE_EXPRESSION: ${{ vars.DAILY_SCHEDULE_EXPRESSION || 'cron(0 6 * * ? *)' }}
      BOOTSTRAP_DELAY_MINUTES: ${{ vars.BOOTSTRAP_DELAY_MINUTES || '10' }}
      BOOTSTRAP_AT: ${{ vars.BOOTSTRAP_AT }}
      BLOG_BRAND_NAME: ${{ vars.BLOG_BRAND_NAME || 'Cloud Scale Daily' }}
      BLOG_AUTHOR_NAME: ${{ vars.BLOG_AUTHOR_NAME || 'Editorial Team' }}
      BLOG_TONE: ${{ vars.BLOG_TONE || 'Confident, practical, senior-engineer friendly' }}
      BLOG_CATEGORY_THEMES: ${{ vars.BLOG_CATEGORY_THEMES || 'Cloud Computing, Serverless, DevOps Automation, AWS Cost Optimization, Platform Engineering' }}
      TEXT_MODEL_ID: ${{ vars.TEXT_MODEL_ID || 'amazon.nova-lite-v1:0' }}
      IMAGE_MODEL_ID: ${{ vars.IMAGE_MODEL_ID || 'amazon.nova-canvas-v1:0' }}
      SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
      PUBLIC_ASSET_BASE_URL: ${{ vars.PUBLIC_ASSET_BASE_URL }}
      BOOTSTRAP_POST_COUNT: ${{ vars.BOOTSTRAP_POST_COUNT || '10' }}
      MAX_PUBLISHED_POSTS: ${{ vars.MAX_PUBLISHED_POSTS || '10' }}
      PUBLISHED_PREFIX: ${{ vars.PUBLISHED_PREFIX || 'published' }}
      ARCHIVE_PREFIX: ${{ vars.ARCHIVE_PREFIX || 'archive' }}
      MANIFEST_KEY: ${{ vars.MANIFEST_KEY || 'published/posts-manifest.json' }}
      IMAGE_WIDTH: ${{ vars.IMAGE_WIDTH || '1536' }}
      IMAGE_HEIGHT: ${{ vars.IMAGE_HEIGHT || '864' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Type-check project
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve AWS account ID
        id: aws-account
        run: echo "account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Bootstrap CDK environment
        run: npx cdk bootstrap aws://${{ steps.aws-account.outputs.account_id }}/${{ env.AWS_REGION }}

      - name: Synthesize CDK stack
        run: npm run synth

      - name: Deploy stack
        run: npm run deploy
